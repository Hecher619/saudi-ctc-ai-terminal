<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTC Specialist Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
        .status-pulse { animation: pulse-gold 2s infinite; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 font-sans min-h-screen flex overflow-hidden">

    <div id="login-gate" class="fixed inset-0 z-50 flex items-center justify-center bg-[#020617] p-6">
        <div class="w-full max-w-sm bg-slate-900 border border-slate-800 p-8 rounded-3xl shadow-2xl">
            <h1 class="text-3xl font-black text-white italic text-center mb-6"><span class="text-yellow-500">CTC</span> ENGINE</h1>
            <input id="gate-pass" type="password" placeholder="Access Code" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 mb-4 focus:outline-none focus:border-yellow-600 transition-colors">
            <button onclick="checkAccess()" class="w-full bg-yellow-600 hover:bg-yellow-500 text-black font-black py-3 rounded-xl uppercase transition-all">Grant Access</button>
        </div>
    </div>

    <div id="sidebar" class="w-64 bg-slate-900 border-r border-slate-800 flex-shrink-0 flex flex-col hidden md:flex">
        <div class="p-6 border-b border-slate-800">
            <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">Session Logs</h2>
        </div>
        <div id="history-list" class="flex-1 overflow-y-auto p-4 space-y-2">
            </div>
    </div>

    <div id="main-interface" class="flex-1 flex flex-col h-screen hidden">
        <header class="p-6 border-b border-yellow-600/10 flex justify-between items-center bg-[#020617]">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-black italic text-white"><span class="text-yellow-500 text-sm">SAUDI</span> CTC</h1>
                <div class="flex items-center gap-2 text-[10px] font-bold text-slate-600 uppercase">
                    <div class="w-2 h-2 bg-yellow-500 rounded-full status-pulse"></div>
                    <span>Authorized Entry</span>
                </div>
            </div>
            <button onclick="location.reload()" class="text-[10px] text-slate-500 hover:text-red-500 uppercase font-bold tracking-widest">Disconnect</button>
        </header>

        <main id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-6 pb-40">
            <div class="bg-yellow-500/5 border border-yellow-600/10 p-4 rounded-xl text-xs text-yellow-500/60 font-mono italic text-center">
                System Initialized. Accessing IT and Telecom Databanks...
            </div>
        </main>

        <div class="p-6 bg-slate-900/50 backdrop-blur-xl border-t border-slate-800">
            <div class="max-w-3xl mx-auto flex gap-3">
                <input id="user-input" type="text" placeholder="Consult CTC Specialists..." class="flex-1 bg-slate-950 border border-slate-800 rounded-2xl px-5 py-3 focus:outline-none focus:border-yellow-600/50 transition-all text-sm">
                <button onclick="sendQuery()" class="bg-yellow-600 hover:bg-yellow-500 text-black font-black px-8 rounded-2xl text-xs uppercase transition-all">Send</button>
            </div>
        </div>
    </div>

    <script>
        // ACCESS CONTROL
        function checkAccess() {
            const passInput = document.getElementById('gate-pass').value;
            if (passInput === 'CTC2026') {
                document.getElementById('login-gate').classList.add('hidden');
                document.getElementById('main-interface').classList.remove('hidden');
                console.log("Access Granted");
            } else {
                alert("ACCESS DENIED: INVALID CREDENTIALS");
                document.getElementById('gate-pass').value = '';
            }
        }

        // QUERY HANDLING
        async function sendQuery() {
    const input = document.getElementById('user-input');
    const container = document.getElementById('chat-container');
    const query = input.value.trim();
    if (!query) return;

    // 1. Add User Bubble (Better Performance)
    const userDiv = document.createElement('div');
    userDiv.className = 'flex justify-end';
    userDiv.innerHTML = `<div class="bg-slate-800/80 border border-slate-700 px-5 py-3 rounded-2xl rounded-tr-none max-w-[80%] text-sm">${query}</div>`;
    container.appendChild(userDiv);
    
    input.value = '';

    // 2. Loading State
    const loaderId = 'loader-' + Date.now();
    const loaderDiv = document.createElement('div');
    loaderDiv.id = loaderId;
    loaderDiv.className = 'text-[10px] text-yellow-600 animate-pulse font-mono pl-2 tracking-widest uppercase';
    loaderDiv.innerText = 'Establishing Uplink...';
    container.appendChild(loaderDiv);
    
    container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });

    try {
        const res = await fetch('/.netlify/functions/chat', {
            method: 'POST',
            body: JSON.stringify({ prompt: query })
        });
        const data = await res.json();
        
        document.getElementById(loaderId).remove();

        // 3. Specialist Response
        const responseDiv = document.createElement('div');
        responseDiv.className = 'bg-slate-900 border-l-2 border-yellow-600 p-6 rounded-r-2xl shadow-xl';
        responseDiv.innerHTML = `
            <span class="text-[9px] font-black text-yellow-600 tracking-widest uppercase mb-4 block">Official CTC Data Packet</span>
            <div class="text-sm text-slate-300 leading-relaxed whitespace-pre-line">${data.text}</div>`;
        container.appendChild(responseDiv);
        
    } catch (err) {
        document.getElementById(loaderId).innerText = 'CONNECTION ERROR: FAILOVER NODES EXHAUSTED';
    }
    
    setTimeout(() => container.scrollTop = container.scrollHeight, 100);
}

            
            if (!query) return;

            // 1. Add to Sidebar Logs
            const logItem = document.createElement('div');
            logItem.className = 'text-[10px] text-slate-500 border border-slate-800 p-2 rounded hover:bg-slate-800 truncate cursor-default transition-colors';
            logItem.innerText = query;
            history.prepend(logItem);

            // 2. Add User Bubble to UI
            container.innerHTML += `
                <div class="flex justify-end">
                    <div class="bg-slate-800/80 border border-slate-700 px-5 py-3 rounded-2xl rounded-tr-none max-w-[80%] text-sm">
                        ${query}
                    </div>
                </div>`;
            
            input.value = ''; // Clear input field

            // 3. Show Loading State
            const loaderId = 'loader-' + Date.now();
            container.innerHTML += `
                <div id="${loaderId}" class="text-[10px] text-yellow-600 animate-pulse font-mono pl-2 tracking-widest uppercase">
                    Establishing Uplink...
                </div>`;
            container.scrollTop = container.scrollHeight;

            try {
                // 4. Fetch from Netlify Function
                const res = await fetch('/.netlify/functions/chat', {
                    method: 'POST',
                    body: JSON.stringify({ 
                        prompt: query,
                        context: "Specialist Instruction: You are a CTC Saudi Arabia Specialist." 
                    })
                });

                const data = await res.json();
                
                // Remove loader
                const loaderElem = document.getElementById(loaderId);
                if(loaderElem) loaderElem.remove();

                // 5. Display Specialist Response
                container.innerHTML += `
                    <div class="bg-slate-900 border-l-2 border-yellow-600 p-6 rounded-r-2xl shadow-xl">
                        <span class="text-[9px] font-black text-yellow-600 tracking-widest uppercase mb-4 block">Official CTC Data Packet</span>
                        <div class="text-sm text-slate-300 leading-relaxed whitespace-pre-line">${data.text}</div>
                    </div>`;
            } catch (err) {
                const loaderElem = document.getElementById(loaderId);
                if(loaderElem) loaderElem.innerText = 'CONNECTION ERROR: FAILOVER NODES EXHAUSTED';
                console.error(err);
            }
            
            container.scrollTop = container.scrollHeight;
        }

        // Handle 'Enter' key in input
        document.getElementById('user-input').addEventListener('keypress', (e) => { 
            if (e.key === 'Enter') sendQuery(); 
        });
        
        // Handle 'Enter' key in password gate
        document.getElementById('gate-pass').addEventListener('keypress', (e) => { 
            if (e.key === 'Enter') checkAccess(); 
        });
    </script>
</body>
</html>
